<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vigil — Clinical dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ClinicalAtoms.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" data-presets="env,react">
  // Wait for all the above scripts to be transpiled & executed, then mount.
  const mount = () => {
    if (!window.App) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  };
  mount();
</script>
</body>
</html>
