<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
.scale { display: flex; flex-direction: column; gap: 6px; }
.r { display: flex; align-items: center; gap: 10px; }
.r .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); min-width: 80px; }
.r .bar { height: 10px; background: var(--ink-700); border-radius: 2px; }
.r .px  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
</style>
</head><body><div class="preview">
  <div class="pv-label">Spacing · 4-point grid</div>
  <div class="scale">
    <div class="r"><span class="tok">space-1</span><span class="bar" style="width:2px"></span><span class="px">2</span></div>
    <div class="r"><span class="tok">space-2</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
    <div class="r"><span class="tok">space-3</span><span class="bar" style="width:6px"></span><span class="px">6</span></div>
    <div class="r"><span class="tok">space-4</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
    <div class="r"><span class="tok">space-5</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
    <div class="r"><span class="tok">space-6</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
    <div class="r"><span class="tok">space-7</span><span class="bar" style="width:20px"></span><span class="px">20</span></div>
    <div class="r"><span class="tok">space-8</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
    <div class="r"><span class="tok">space-9</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
    <div class="r"><span class="tok">space-10</span><span class="bar" style="width:40px"></span><span class="px">40</span></div>
  </div>
</div></body></html>
