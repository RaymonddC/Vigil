<!doctype html><html><head><meta charset="utf-8"><title>Type · numeric mono</title>
<link rel="stylesheet" href="_preview.css">
<style>
.vitals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.v { padding: 10px 12px; border: 1px solid var(--border-subtle); border-radius: 6px; background: var(--surface-1); }
.v .lbl { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); font-weight: 500; }
.v .num { font-family: var(--font-mono); font-size: 26px; font-weight: 500; color: var(--fg-1); letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
.v .unit { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); margin-left: 2px; }
</style>
</head><body><div class="preview">
  <div class="pv-label">Numeric · JetBrains Mono · tabular nums</div>
  <div class="vitals">
    <div class="v"><div class="lbl">HR</div><div class="num">128<span class="unit">bpm</span></div></div>
    <div class="v"><div class="lbl">MAP</div><div class="num">62<span class="unit">mmHg</span></div></div>
    <div class="v"><div class="lbl">SpO₂</div><div class="num">94<span class="unit">%</span></div></div>
    <div class="v"><div class="lbl">Temp</div><div class="num">38.4<span class="unit">°C</span></div></div>
  </div>
</div></body></html>
