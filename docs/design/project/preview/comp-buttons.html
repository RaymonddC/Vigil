<!doctype html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_preview.css">
<style>
.grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 6px; border: 1px solid var(--border-default); background: var(--surface-1); color: var(--fg-1); font-family: var(--font-sans); font-size: 13px; font-weight: 500; cursor: pointer; }
.btn--primary { background: var(--ink-700); border-color: var(--ink-700); color: #fff; }
.btn--danger { background: var(--danger); border-color: var(--danger); color: #fff; }
.btn--ghost { background: transparent; border-color: transparent; color: var(--fg-2); }
.btn--lg { height: 40px; padding: 0 16px; font-size: 14px; }
.btn--sm { height: 26px; padding: 0 10px; font-size: 12px; }
.btn[disabled] { opacity: .4; cursor: not-allowed; }
</style>
</head><body><div class="preview">
  <div class="pv-label">Buttons · primary / secondary / ghost / danger · states</div>
  <div class="grid">
    <button class="btn btn--primary">Approve</button>
    <button class="btn">Dismiss</button>
    <button class="btn btn--ghost">Cancel</button>
    <button class="btn btn--danger">Escalate</button>
    <button class="btn btn--primary" disabled>Approved</button>
  </div>
  <div class="grid">
    <button class="btn btn--sm">Small</button>
    <button class="btn">Default</button>
    <button class="btn btn--lg btn--primary">Large primary</button>
  </div>
</div></body></html>
