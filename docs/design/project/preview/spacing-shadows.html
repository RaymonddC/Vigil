<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_preview.css">
<style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; padding: 10px; }
.sh { height: 80px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
.sh .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); font-weight: 500; }
.sh .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
.s1 { box-shadow: 0 1px 2px rgba(11,15,20,.04); border: 1px solid var(--border-default); }
.s2 { box-shadow: 0 2px 8px rgba(11,15,20,.06), 0 0 0 1px rgba(11,15,20,.04); }
.s3 { box-shadow: 0 12px 32px rgba(11,15,20,.10), 0 0 0 1px rgba(11,15,20,.06); }
</style>
</head><body><div class="preview">
  <div class="pv-label">Shadows · rare and quiet · 1px borders carry structure</div>
  <div class="grid">
    <div class="sh s1"><div class="tok">shadow-xs</div><div class="v">card hover</div></div>
    <div class="sh s2"><div class="tok">shadow-sm</div><div class="v">popovers</div></div>
    <div class="sh s3"><div class="tok">shadow-md</div><div class="v">modals</div></div>
  </div>
</div></body></html>
