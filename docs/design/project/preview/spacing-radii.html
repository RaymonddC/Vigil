<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_preview.css">
<style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.sh { height: 72px; background: var(--surface-1); border: 1px solid var(--border-default); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
.sh .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); font-weight: 500; }
.sh .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head><body><div class="preview">
  <div class="pv-label">Radii · four only · no pills except chips</div>
  <div class="grid">
    <div class="sh" style="border-radius:4px"><div class="tok">radius-sm</div><div class="v">4 · inputs, chips</div></div>
    <div class="sh" style="border-radius:6px"><div class="tok">radius-md</div><div class="v">6 · cards, buttons</div></div>
    <div class="sh" style="border-radius:10px"><div class="tok">radius-lg</div><div class="v">10 · modals</div></div>
    <div class="sh" style="border-radius:999px"><div class="tok">radius-full</div><div class="v">999 · status only</div></div>
  </div>
</div></body></html>
