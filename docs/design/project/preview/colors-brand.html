<!doctype html><html><head><meta charset="utf-8"><title>Brand ink</title>
<link rel="stylesheet" href="_preview.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
.sw { height: 56px; border-radius: 4px; display: flex; align-items: flex-end; padding: 6px; }
.sw b { font-family: var(--font-mono); font-size: 10px; font-weight: 500; }
.sw.light b { color: #fff; }
.sw.dark b { color: var(--ink-900); }
.primary-mark { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--ink-700); border-radius: 6px; color: #fff; }
.primary-mark .dot { width: 24px; height: 24px; background: #fff; border-radius: 4px; color: var(--ink-700); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
.primary-mark .txt { font-size: 12px; font-weight: 500; letter-spacing: 0.02em; }
.primary-mark .hex { margin-left: auto; font-family: var(--font-mono); font-size: 11px; opacity: .75; }
</style>
</head><body><div class="preview">
  <div class="pv-label">Brand ink · deep institutional indigo</div>
  <div class="swatches">
    <div class="sw dark" style="background:#EEF1F8"><b>50</b></div>
    <div class="sw dark" style="background:#D8DEEE"><b>100</b></div>
    <div class="sw dark" style="background:#8B9BC5"><b>300</b></div>
    <div class="sw light" style="background:#4A5E93"><b>500</b></div>
    <div class="sw light" style="background:#3A4D7E"><b>600</b></div>
    <div class="sw light" style="background:#2B3A67"><b>700</b></div>
    <div class="sw light" style="background:#1F2C4F"><b>800</b></div>
    <div class="sw light" style="background:#162038"><b>900</b></div>
  </div>
  <div class="primary-mark">
    <div class="dot">V</div>
    <div class="txt">Primary — ink-700</div>
    <div class="hex">#2B3A67</div>
  </div>
</div></body></html>
