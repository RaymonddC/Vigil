# -----------------------------------------------------------------------------
# Vigil — full single-host stack (used by the AWS EC2 deploy, deploy/aws/).
#
# Services on an internal docker network:
#   hapi-db   — postgres for HAPI (internal)
#   hapi      — HAPI FHIR R4 server, bound to 127.0.0.1:8080 on the host only
#   mcp       — SERVICE=mcp, FastAPI/FastMCP on :7001
#   a2a       — SERVICE=a2a, A2A agent on :9000 (AgentCard served here)
#   api       — SERVICE=api, FastAPI proxy on :8000 (dashboard API + approve)
#   frontend  — Next.js prod build on :3000
#   caddy     — reverse proxy on :80/:443, auto Let's Encrypt, routes to the
#               four app services above. This is the ONLY publicly exposed
#               service. See deploy/aws/Caddyfile for routing.
#
# HAPI stays off the public network (SEC-10). Only ports 80 and 443 need to
# be open on the EC2 security group; the 127.0.0.1:8080 mapping on hapi is
# for SSH-local debugging and is not reachable from the public internet.
# -----------------------------------------------------------------------------

services:
  # Internal — Postgres backing HAPI. Never publicly routed.
  hapi-db:
    image: postgres:15-alpine
    container_name: vigil-hapi-db
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: hapi
    volumes:
      - hapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Portfolio / dev only — FHIR store for the dashboard. Judges' FHIR data
  # flows through Prompt Opinion's workspace via A2A metadata, not this HAPI.
  hapi:
    # Built from Dockerfile.hapi: upstream hapiproject/hapi:v7.2.0 plus
    # a statically-linked busybox for the healthcheck probe. See the
    # Dockerfile header for rationale.
    build:
      context: .
      dockerfile: Dockerfile.hapi
    image: vigil-hapi:latest
    container_name: vigil-hapi
    # SEC-10: bind to loopback only. Internal docker network lets peers
    # reach the container by service name (hapi:8080); the host-port
    # binding here is ONLY for ssh-port-forwarded debugging from a laptop.
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      hapi-db:
        condition: service_healthy
    environment:
      "spring.datasource.url": "jdbc:postgresql://hapi-db:5432/hapi"
      "spring.datasource.username": "hapi"
      "spring.datasource.password": "hapi"
      "spring.datasource.driverClassName": "org.postgresql.Driver"
      "spring.jpa.properties.hibernate.dialect": "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgres94Dialect"
      "hapi.fhir.fhir_version": "R4"
      "hapi.fhir.allow_multiple_delete": "true"
      "hapi.fhir.reuse_cached_search_results_millis": "0"
      "hapi.fhir.default_encoding": "JSON"
      # Demo posture: don't reject writes for missing cross-resource
      # references. The approve flow still does idempotent PUTs for the
      # vigil Device + PractitionerRole, but any new reference we add
      # later won't break the write until someone updates the ensure list.
      # Real hospital deployments would leave these ON and manage integrity
      # via a staging step. See SECURITY_REVIEW.md for production posture.
      "hapi.fhir.enforce_referential_integrity_on_write": "false"
      "hapi.fhir.enforce_referential_integrity_on_delete": "false"
    healthcheck:
      # Semantic probe via busybox wget — passes only when HAPI has
      # finished Hibernate migration and is serving CapabilityStatement.
      # Budget: start_period (120s grace) + retries * interval (300s) =
      # 7 minutes before unhealthy. HAPI cold-start on a 4 GB instance
      # with a fresh schema migration can take 90-150s, so the grace is
      # deliberately generous.
      test: ["CMD", "/bin/busybox", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/fhir/metadata"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Internal — A2A agent's private tool layer (the 4 clinical tools).
  # Under Option 3 the agent calls this over the docker bridge; the public
  # /mcp Caddy route is a Path-A holdover and not part of the submission.
  # ---------------------------------------------------------------------------
  mcp:
    # mcp is the declared builder for the shared vigil-backend image.
    # a2a and api reference the same tag without their own build: block,
    # so compose's bake backend builds once instead of racing three
    # parallel exports onto the same image reference.
    build:
      context: .
      dockerfile: Dockerfile
    image: vigil-backend:latest
    container_name: vigil-mcp
    environment:
      SERVICE: mcp
      MCP_PORT: "7001"
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VIGIL_API_KEY: ${VIGIL_API_KEY:?VIGIL_API_KEY must be set in .env}
      FHIR_BASE_URL: http://hapi:8080/fhir
      ALLOWED_FHIR_HOSTS: http://hapi:8080/fhir,http://localhost:8080/fhir
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${SITE_DOMAIN:-localhost}}
      CACHE_TTL_SEC: "300"
      LOG_LEVEL: INFO
    depends_on:
      hapi:
        condition: service_healthy
    expose:
      - "7001"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Public — hackathon submission surface. Serves the AgentCard at
  # /.well-known/agent-card.json and JSON-RPC at /a2a. A2A_PUBLIC_URL lands
  # inside the card so Prompt Opinion's runtime calls back to the right URL.
  # ---------------------------------------------------------------------------
  a2a:
    # Shares vigil-backend:latest with mcp (built there). See mcp service.
    image: vigil-backend:latest
    container_name: vigil-a2a
    environment:
      SERVICE: a2a
      A2A_PORT: "9000"
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VIGIL_API_KEY: ${VIGIL_API_KEY:?VIGIL_API_KEY must be set in .env}
      MCP_BASE_URL: http://mcp:7001
      FHIR_BASE_URL: http://hapi:8080/fhir
      # /a2a suffix lines up with the Caddyfile's `handle /a2a*` route —
      # external A2A callers hit this URL directly from the AgentCard.
      A2A_PUBLIC_URL: ${A2A_PUBLIC_URL:-https://${SITE_DOMAIN:-localhost}/a2a}
      POLL_INTERVAL_SEC: "900"
      # Persist the SBAR review queue on a named volume so it survives
      # rebuilds and doesn't need a writable /app/backend/api/ directory.
      # Shared with the api service so agent-enqueued alerts are visible
      # to the proxy's approve flow (the api container reads from the
      # same named volume).
      VIGIL_REVIEW_QUEUE_PATH: /var/lib/vigil/review_queue.db
      LOG_LEVEL: INFO
    volumes:
      - vigil-review-queue:/var/lib/vigil
    depends_on:
      hapi:
        condition: service_healthy
    expose:
      - "9000"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Portfolio — dashboard backend (FHIR reads + clinician approve write
  # path). Reached publicly only via the Next.js /api/* server-side proxy,
  # never directly. Not part of the hackathon submission surface.
  # ---------------------------------------------------------------------------
  api:
    # Shares vigil-backend:latest with mcp (built there). See mcp service.
    image: vigil-backend:latest
    container_name: vigil-api
    environment:
      SERVICE: api
      API_PORT: "8000"
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VIGIL_API_KEY: ${VIGIL_API_KEY:?VIGIL_API_KEY must be set in .env}
      FHIR_BASE_URL: http://hapi:8080/fhir
      A2A_AGENT_URL: http://a2a:9000
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${SITE_DOMAIN:-localhost}}
      # Persist the SBAR review queue on a named volume so it survives
      # rebuilds and doesn't need a writable /app/backend/api/ directory.
      VIGIL_REVIEW_QUEUE_PATH: /var/lib/vigil/review_queue.db
      LOG_LEVEL: INFO
    volumes:
      - vigil-review-queue:/var/lib/vigil
    depends_on:
      hapi:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      # In-process urllib probe — python is already on PATH, no extra
      # deps needed. /api/health skips the X-API-Key middleware so this
      # doesn't need credentials. Matches the deploy probe in CI.
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Portfolio — clinician dashboard (Next.js prod build). Public catch-all
  # under https://${SITE_DOMAIN}/. Hits the api service internally via
  # BACKEND_URL for RSC, and same-origin /api via Caddy for client calls.
  # Not part of the hackathon submission surface.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = same-origin /api, routed by Caddy to api:8000.
        NEXT_PUBLIC_API_BASE_URL: ""
    image: vigil-frontend:latest
    container_name: vigil-frontend
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Server-side calls (RSC, /api/[...path] proxy) go direct to the api
      # container over the internal docker network.
      BACKEND_URL: http://api:8000
      # Same shared secret the backend enforces via the X-API-Key
      # middleware. frontend/lib/api.ts injects this header on every
      # RSC fetch; without it every server-rendered page 401s.
      VIGIL_API_KEY: ${VIGIL_API_KEY:?VIGIL_API_KEY must be set in .env}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Public ingress — Caddy reverse proxy (TLS + Let's Encrypt). The only
  # process that binds the host's 80/443. Routes /a2a + /.well-known/...
  # to the agent (submission surface) and /, /api/* to the dashboard
  # (portfolio surface). See deploy/aws/Caddyfile for the routing table.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.8-alpine
    container_name: vigil-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-:80}
    volumes:
      - ./deploy/aws/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - mcp
      - a2a
      - api
      - frontend
    restart: unless-stopped

volumes:
  hapi-db-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  vigil-review-queue:
    driver: local
