# Cloud Run — Vigil MCP Server (vigil-mcp)
#
# Deploy:
#   gcloud run services replace deploy/gcp/cloud-run-mcp.yaml \
#     --region=us-central1 --project=$PROJECT_ID
#
# Replace PROJECT_ID and the image digest before applying.
# Public — Prompt Opinion's runtime calls POST /mcp.
# Calls HAPI via private networking (Cloud SQL + VPC connector).
# The streamable-HTTP MCP endpoint is mounted at /mcp (see backend/mcp_server/server.py).

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: vigil-mcp
  annotations:
    # Public ingress — PO must be able to reach /mcp from the open internet.
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        # VPC connector so this service can reach vigil-hapi (ingress=internal)
        # and Cloud SQL via private IP. Only private ranges routed via VPC.
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/us-central1/connectors/vigil-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
        # min=1 avoids 3-5s cold-start on the first judge invocation.
        # Set to 0 post-demo to drop to $0 during idle.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      serviceAccountName: vigil-run@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 300
      containers:
        - name: vigil-mcp
          image: us-central1-docker.pkg.dev/PROJECT_ID/vigil/vigil:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: SERVICE
              value: mcp
            # Cloud Run sets $PORT=8080; our Dockerfile reads MCP_PORT so mirror it.
            - name: MCP_PORT
              value: "8080"
            - name: LLM_PROVIDER
              value: groq
            - name: FHIR_BASE_URL
              # vigil-hapi Cloud Run service — internal-only URL. Populated after
              # `gcloud run services describe vigil-hapi --format='value(status.url)'`.
              value: https://vigil-hapi-PROJECT_HASH-uc.a.run.app/fhir
            - name: CORS_ORIGINS
              value: https://vigil-frontend.vercel.app,http://localhost:3000
            - name: LOG_LEVEL
              value: INFO
            - name: CACHE_TTL_SEC
              value: "300"
            - name: ALLOWED_FHIR_HOSTS
              # Lock the FHIR client host allowlist to our Cloud Run private hosts.
              value: vigil-hapi-PROJECT_HASH-uc.a.run.app,localhost
            - name: VIGIL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vigil-api-key
                  key: latest
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-api-key
                  key: latest
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
            periodSeconds: 30
            timeoutSeconds: 5
  traffic:
    - percent: 100
      latestRevision: true
