# Cloud Build — build the single Vigil image once and push to Artifact Registry.
#
# Our Dockerfile is service-generic: it picks SERVICE=mcp|a2a|api at runtime
# via env var, so there is exactly one image to build for the three Python
# services. HAPI uses the upstream hapiproject/hapi image, no build needed.
#
# Trigger manually:
#   gcloud builds submit --config=deploy/gcp/cloudbuild.yaml \
#     --project=$PROJECT_ID \
#     --substitutions=_LOCATION=us-central1,_REPO=vigil,_IMAGE=vigil,SHORT_SHA=$(git rev-parse --short HEAD)
#
# Or wire a trigger on push to main via:
#   gcloud builds triggers create github \
#     --repo-name=Vigil --repo-owner=<owner> --branch-pattern=^main$ \
#     --build-config=deploy/gcp/cloudbuild.yaml
#
# Pre-req (one-time):
#   gcloud artifacts repositories create vigil \
#     --repository-format=docker --location=us-central1 \
#     --description="Vigil container images"

substitutions:
  _LOCATION: us-central1
  _REPO: vigil
  _IMAGE: vigil

steps:
  # 1. Build with both :latest and :$SHORT_SHA tags.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
      - --tag=${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
      - --file=Dockerfile
      - .

  # 2. Push both tags to Artifact Registry.
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
    waitFor: ["build"]

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
    waitFor: ["build"]

images:
  - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest
  - ${_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
