# Fly.io config — Vigil FastAPI Proxy (vigil-api)
# Deploy: fly deploy --config deploy/fly.api.toml --app vigil-api
#
# Powers the Next.js frontend dashboard.
# The approve endpoint is the ONLY FHIR write path in the stack.
# Public URL: https://vigil-api.fly.dev
#
# HAPI FHIR reached via Fly.io private networking — NEVER publicly routed (SEC-10).

app = "vigil-api"
primary_region = "sin"

[build]
  dockerfile = "../Dockerfile"

[env]
  SERVICE        = "api"
  API_PORT       = "8000"
  FHIR_BASE_URL  = "http://vigil-hapi.internal:8080/fhir"
  A2A_AGENT_URL  = "http://vigil-a2a.internal:9000"
  LLM_PROVIDER   = "groq"
  CORS_ORIGINS   = "https://vigil-frontend.vercel.app,http://localhost:3000"
  LOG_LEVEL      = "INFO"

# Secrets:
# VIGIL_API_KEY  — API key enforced on every request (SEC-05)
# GROQ_API_KEY   — or ANTHROPIC_API_KEY

[[services]]
  internal_port = 8000
  protocol      = "tcp"

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"
    path         = "/api/health"
