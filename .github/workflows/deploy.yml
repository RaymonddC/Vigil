name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger manually from the Actions tab

concurrency:
  group: ec2-deploy
  cancel-in-progress: false   # don't cancel a running deploy; queue instead

jobs:
  deploy:
    name: SSH + rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} <<'ENDSSH'
            set -euo pipefail
            cd /opt/vigil
            echo "::group::git pull"
            sudo git pull --ff-only origin main
            echo "::endgroup::"
            echo "::group::docker compose up -d --build"
            sudo docker compose up -d --build
            echo "::endgroup::"
            echo "::group::docker compose ps"
            sudo docker compose ps
            echo "::endgroup::"
          ENDSSH

      - name: Healthcheck — dashboard /api/health
        run: |
          # Probe against SITE_DOMAIN (not EC2_HOST) — Caddy's Let's Encrypt
          # cert is issued for the public hostname, so HTTPS requests to the
          # raw IP fail with a TLS internal-error alert. EC2_HOST keeps being
          # used for SSH (no cert needed there).
          #
          # Retry up to 60 s for Caddy + api to settle. Previously this step
          # `exit 0`'d on ANY response, so every broken deploy went green in
          # Actions and we only noticed by SSHing in.
          set -e
          DOMAIN="${{ secrets.SITE_DOMAIN }}"
          if [[ -z "${DOMAIN}" ]]; then
            echo "::error::SITE_DOMAIN secret is not set. Add it in repo Settings → Secrets and variables → Actions (e.g. '13-238-216-196.sslip.io')."
            exit 1
          fi
          URL="https://${DOMAIN}/api/health"
          echo "Probing ${URL}"
          for attempt in $(seq 1 12); do
            code=$(curl -sS -L -o /dev/null -w "%{http_code}" -m 10 "${URL}" || echo "000")
            echo "  attempt ${attempt}/12 → ${code}"
            if [[ "${code}" == "200" ]]; then
              echo "::notice::Dashboard healthy after ${attempt} attempt(s)."
              break
            fi
            if [[ "${attempt}" == "12" ]]; then
              echo "::error::/api/health never returned 200 within 60 s. Last code: ${code}."
              exit 1
            fi
            sleep 5
          done

      - name: Healthcheck — A2A AgentCard
        run: |
          # The hackathon submission surface (Option 3). Without this probe,
          # a broken AgentCard would ship silently — Prompt Opinion's
          # `Add Connection → Check` fetches this URL and parses the JSON.
          #
          # Path: the A2A spec mandates the card at the root well-known path,
          # which Caddy routes via `handle /.well-known/agent-card.json`.
          # The /a2a JSON-RPC mount is a separate concern (refactor pending).
          #
          # We require both 200 and a non-empty JSON body containing the
          # agent's declared name — empty 200s and HTML error pages have
          # both happened before.
          set -e
          DOMAIN="${{ secrets.SITE_DOMAIN }}"
          if [[ -z "${DOMAIN}" ]]; then
            echo "::error::SITE_DOMAIN secret is not set."
            exit 1
          fi
          URL="https://${DOMAIN}/.well-known/agent-card.json"
          echo "Probing ${URL}"
          BODY_FILE="$(mktemp)"
          for attempt in $(seq 1 12); do
            code=$(curl -sS -L -o "${BODY_FILE}" -w "%{http_code}" -m 10 "${URL}" || echo "000")
            echo "  attempt ${attempt}/12 → ${code}"
            if [[ "${code}" == "200" ]]; then
              # Non-empty + valid JSON + has a "name" field
              if jq -e '.name | type == "string" and length > 0' "${BODY_FILE}" >/dev/null 2>&1; then
                NAME=$(jq -r '.name' "${BODY_FILE}")
                echo "::notice::AgentCard healthy after ${attempt} attempt(s) — name='${NAME}'."
                rm -f "${BODY_FILE}"
                exit 0
              else
                echo "  → 200 but body is not a valid AgentCard JSON; retrying"
              fi
            fi
            sleep 5
          done
          echo "::error::AgentCard probe failed within 60 s. Last code: ${code}."
          echo "::group::Last response body"
          cat "${BODY_FILE}" || true
          echo "::endgroup::"
          rm -f "${BODY_FILE}"
          exit 1
